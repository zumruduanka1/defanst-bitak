<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>

<style>
body {
  background:#0b1220;
  color:white;
  font-family:sans-serif;
}
.container {
  width:900px;
  margin:auto;
}
.card {
  background:#111827;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}
textarea,input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}
button {
  margin-top:15px;
  padding:12px;
  width:100%;
  background:linear-gradient(90deg,#4f46e5,#9333ea);
  color:white;
  border:none;
}
.bar {
  height:20px;
  background:green;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h1>DEFANS</h1>
<p>Dezenformasyon Analiz Sistemi</p>

<div class="card">
<textarea id="metin"></textarea>
<input id="email" placeholder="email">
<button onclick="analiz()">Analiz Başlat</button>

<div id="sonuc"></div>
<div class="bar" id="bar"></div>
</div>

<div class="card">
<h3>Twitter</h3>
<div id="twitter"></div>
</div>

<div class="card">
<h3>Haberler</h3>
<div id="haber"></div>
</div>

</div>

<script>
function analiz(){
  fetch('/analiz',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      metin:metin.value,
      email:email.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    sonuc.innerText = d.sonuc;
    bar.style.width = d.guven + "%";
  });
}

fetch('/twitter')
.then(r=>r.json())
.then(d=>{
  twitter.innerText = d.map(x=>x.title).join(" | ");
});

fetch('/haber')
.then(r=>r.json())
.then(d=>{
  haber.innerText = d.map(x=>x.title).join(" | ");
});
</script>

</body>
</html>
