<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>DEFANS PRO</h1>

<div class="container">

<div class="left">
<textarea id="text"></textarea>
<button onclick="analyze()">Analiz Et</button>
<h2 id="result"></h2>
</div>

<div class="right">
<h3>Canlı Sosyal Medya</h3>
<div id="stream"></div>
</div>

</div>

<script>
function analyze(){
fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"text="+document.getElementById("text").value
})
.then(r=>r.json())
.then(d=>{
document.getElementById("result").innerText =
"Risk: "+d.risk+" - "+d.label
})
}

function load(){
fetch("/stream")
.then(r=>r.json())
.then(data=>{
let html=""
data.forEach(i=>{
html+=`<p>${i.text} (%${i.risk})</p>`
})
document.getElementById("stream").innerHTML=html
})
}

setInterval(load,3000)
</script>

</body>
</html>
