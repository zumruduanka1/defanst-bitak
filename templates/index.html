<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>DEFANS</h1>

<textarea id="text"></textarea>
<button onclick="send()">Analiz</button>

<div class="meter">
  <div id="bar"></div>
</div>

<h2 id="result"></h2>

<div id="feed"></div>

<script>
function send(){
 fetch("/analyze",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text:document.getElementById("text").value})
 })
 .then(r=>r.json())
 .then(d=>{
   if(d.error){alert(d.error);return;}
   document.getElementById("result").innerText = d.label+" "+d.risk+"%";
   document.getElementById("bar").style.width = d.risk+"%";
 })
}

function load(){
 fetch("/social")
 .then(r=>r.json())
 .then(data=>{
   let html="";
   data.forEach(i=>{
     html+=`<div class="post">
     [${i.source}] ${i.text}
     <b>${i.label} (${i.risk}%)</b>
     </div>`;
   });
   document.getElementById("feed").innerHTML=html;
 })
}

setInterval(load,5000)
load()
</script>

</body>
</html>
