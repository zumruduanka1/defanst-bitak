<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>

<style>
body {background:#020617;color:white;font-family:Arial;margin:0}
.container {max-width:1100px;margin:auto;padding:40px}
.grid {display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card {background:#0f172a;padding:20px;border-radius:15px}
textarea {width:100%;height:120px;background:#020617;color:white;border:none;padding:10px}
button {width:100%;padding:12px;background:#6366f1;color:white;border:none;margin-top:10px}
.item {padding:10px;border-bottom:1px solid #1e293b}
</style>

</head>

<body>

<div class="container">

<h1>DEFANS</h1>

<div class="grid">

<div class="card">
<textarea id="text"></textarea>
<button onclick="analyze()">Analiz</button>
<h3 id="res"></h3>
</div>

<div class="card">
<h3>Kaynak Akışı</h3>
<div id="feed"></div>
</div>

</div>

</div>

<script>

async function analyze(){
 let t=document.getElementById("text").value
 let r=await fetch("/api/analyze",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({text:t})
 })
 let d=await r.json()
 document.getElementById("res").innerText="Risk:"+d.risk
}

async function load(){
 let r=await fetch("/api/all")
 let d=await r.json()
 let html=""
 d.feed.forEach(x=>{
  html+=`<div class="item">%${x.risk} - ${x.text}</div>`
 })
 document.getElementById("feed").innerHTML=html
}

setInterval(load,3000)
load()

</script>

</body>
</html>
