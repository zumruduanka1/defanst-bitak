<!DOCTYPE html>
<html>
<head>
<title>DEFANS</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>DEFANS</h1>

<div class="container">

<div class="left">
<input id="email" placeholder="E-posta">
<textarea id="text"></textarea>
<button onclick="analyze()">Analiz Et</button>
<p id="result"></p>
</div>

<div class="right">
<h3>Canlı Akış (Sosyal Medya)</h3>
{% for item in feed %}
<p>{{item.text}} (%{{item.risk}})</p>
{% endfor %}
</div>

</div>

<script>
function analyze(){
fetch("/analyze",{
method:"POST",
body:new URLSearchParams({
text:document.getElementById("text").value,
email:document.getElementById("email").value
})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("result").innerText =
"Risk: "+d.risk+" | "+d.label;
});
}
</script>

</body>
</html>
