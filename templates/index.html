<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>DEFANS PRO</h1>
<p>Sosyal Medya Yalan Haber Tespit Sistemi</p>

<div class="panel">
<textarea id="text" placeholder="Metin gir..."></textarea>
<button onclick="analyze()">Analiz Et</button>
</div>

<div id="result"></div>

<h2>Canlı Sosyal Medya Akışı</h2>
<div id="feed"></div>

<canvas id="chart"></canvas>

</div>

<script>
async function analyze(){
let t = document.getElementById("text").value;

let res = await fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:t})
});

let d = await res.json();
document.getElementById("result").innerHTML = "%"+d.score;
}

async function loadFeed(){

let res = await fetch("/twitter");
let data = await res.json();

let html="";

data.forEach(i=>{
html+=`
<div class="feedItem">
<b>${i.platform}</b>
<p>${i.text}</p>
<div class="progressBar" style="width:${i.risk}%"></div>
%${i.risk}
</div>
`;
});

document.getElementById("feed").innerHTML=html;
drawChart(data);
}

setInterval(loadFeed,3000);

function drawChart(data){
let safe = data.filter(x=>x.risk<50).length;
let danger = data.filter(x=>x.risk>=50).length;

new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:['Güvenli','Riskli'],
datasets:[{data:[safe,danger]}]
}
});
}

loadFeed();
</script>

</body>
</html>
