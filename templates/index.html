<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="nav">
    <div class="logo">🛡️ DEFANS PRO</div>
    <div class="badge">AI Powered</div>
</div>

<div class="hero">
    <h1>DEFANS</h1>
    <h2>Dezenformasyon Erken Fark ve Analiz Sistemi</h2>
    <p>Yalan haberleri, manipülasyonu ve dezenformasyonu anında tespit edin.</p>
</div>

<div class="stats">
    <div class="card">4<br><span>Toplam Analiz</span></div>
    <div class="card red">0<br><span>Tehlikeli İçerik</span></div>
    <div class="card green">1<br><span>Güvenli İçerik</span></div>
</div>

<div class="main">

    <!-- SOL -->
    <div class="panel left">
        <div class="tabs">
            <button class="active">Metin</button>
            <button>URL</button>
            <button>Görsel</button>
        </div>

        <input type="text" id="email" placeholder="E-posta Adresiniz">

        <textarea id="text">Metni buraya gir...</textarea>

        <button class="analyze" onclick="analyze()">🧠 Yapay Zeka Analizi Başlat</button>

        <div class="progressBox">
            <div class="progressBar" id="bar"></div>
        </div>

        <div id="result"></div>
    </div>

    <!-- SAĞ -->
    <div class="panel right">
        <h3>📊 Son Analizler</h3>
        <div id="feed"></div>
    </div>

</div>

<script>
async function analyze(){
    let text = document.getElementById("text").value;

    if(text.length < 10){
        alert("Geçerli içerik gir");
        return;
    }

    let res = await fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({text})
    });

    let data = await res.json();

    document.getElementById("bar").style.width = data.score + "%";

    document.getElementById("result").innerHTML =
        data.label + " (%" + data.score + ")";
}

async function loadFeed(){
    let res = await fetch("/social");
    let data = await res.json();

    let feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.forEach(item=>{
        let div = document.createElement("div");
        div.className = "feedItem";

        div.innerHTML = `
        <span class="platform">${item.platform}</span>
        <p>${item.text}</p>
        <div class="risk ${item.risk > 70 ? "danger":"safe"}">
            %${item.risk}
        </div>
        `;

        feed.appendChild(div);
    });
}

loadFeed();
</script>

</body>
</html>
