<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
    <h1>DEFANS</h1>
    <h2>Dezenformasyon Erken Fark ve Analiz Sistemi</h2>
</div>

<div class="stats">
    <div class="box"><span id="total">0</span><br>Toplam Analiz</div>
    <div class="box red"><span id="danger">0</span><br>Tehlikeli</div>
    <div class="box green"><span id="safe">0</span><br>Güvenli</div>
</div>

<div class="main">

<div class="left">
    <textarea id="text" placeholder="Metin gir"></textarea>
    <button onclick="analyze()">Yapay Zeka Analizi Başlat</button>

    <div class="meter">
        <div id="bar"></div>
    </div>

    <h2 id="result"></h2>
</div>

<div class="right">
    <div class="card">
        <h3>🌐 Sosyal Medya Akışı</h3>
        {% for s in social %}
        <p>{{s.text}}</p>
        {% endfor %}
    </div>
</div>

</div>

<script>
let total=0,danger=0,safe=0;

function analyze(){
    let text=document.getElementById("text").value;

    fetch("/analyze",{
        method:"POST",
        body:new URLSearchParams({text})
    })
    .then(r=>r.json())
    .then(d=>{
        total++;
        if(d.risk>60) danger++; else safe++;

        document.getElementById("total").innerText=total;
        document.getElementById("danger").innerText=danger;
        document.getElementById("safe").innerText=safe;

        document.getElementById("result").innerText =
        d.label+" ("+d.risk+"%)";

        let bar=document.getElementById("bar");
        bar.style.width=d.risk+"%";
        bar.style.background = d.risk>60 ? "red":"lime";
    });
}
</script>

</body>
</html>
