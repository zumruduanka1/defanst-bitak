<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

<h1>DEFANS</h1>
<p>Dezenformasyon Erken Analiz Sistemi</p>

<!-- ÜST KARTLAR -->
<div class="cards">
<div class="card blue">Toplam<br><b id="total">0</b></div>
<div class="card red">Risk<br><b id="danger">0</b></div>
<div class="card green">Güvenli<br><b id="safe">0</b></div>
</div>

<!-- ANA -->
<div class="main">

<!-- SOL -->
<div class="box">
<textarea id="text" placeholder="Metin gir..."></textarea>
<button onclick="analyze()">Yapay Zeka Analizi Başlat</button>
</div>

<!-- SAĞ -->
<div class="box">
<h3>Son Analizler</h3>
<div id="feed"></div>
</div>

</div>

</div>

<script>

let stats={total:0,danger:0,safe:0}

function icon(p){
if(p=="X") return "🐦";
if(p=="INSTAGRAM") return "📸";
if(p=="TIKTOK") return "🎵";
return "🔥";
}

function analyze(){
let text=document.getElementById("text").value;

fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text})
})
.then(r=>r.json())
.then(d=>{

stats.total++;

if(d.score>50) stats.danger++;
else stats.safe++;

updateStats();

// sonucu da feed'e ekle
addItem({
text:text,
platform:"USER",
risk:d.score
})

});
}

function updateStats(){
document.getElementById("total").innerText=stats.total;
document.getElementById("danger").innerText=stats.danger;
document.getElementById("safe").innerText=stats.safe;
}

function addItem(i){
let html=`
<div class="item">
<b>${icon(i.platform)} ${i.platform}</b><br>
${i.text}

<div class="bar" style="
width:${i.risk}%;
background:${i.risk>50?'red':'lime'}
"></div>

%${i.risk}
</div>
`;

document.getElementById("feed").innerHTML = html + document.getElementById("feed").innerHTML;
}

function load(){
fetch("/feed")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach(i=>{
html+=`
<div class="item">
<b>${icon(i.platform)} ${i.platform}</b><br>
${i.text}

<div class="bar" style="
width:${i.risk}%;
background:${i.risk>50?'red':'lime'}
"></div>

%${i.risk}
</div>`;
});

document.getElementById("feed").innerHTML=html;

});
}

// 🔥 sürekli veri gelsin
setInterval(load,4000);
load();

</script>

</body>
</html>
