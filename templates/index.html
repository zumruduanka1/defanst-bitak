<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DEFANS PRO</title>

<style>
body {
    background: #0b0f1a;
    color: white;
    font-family: Arial;
}

.container {
    width: 80%;
    margin: auto;
    text-align: center;
}

.title {
    font-size: 40px;
    font-weight: bold;
}

.box {
    background: #121826;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    background: #0b0f1a;
    color: white;
    border: 1px solid #333;
}

button {
    background: linear-gradient(45deg, #4facfe, #00f2fe);
    border: none;
    padding: 15px;
    width: 100%;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.progress {
    height: 20px;
    background: #222;
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, red, orange);
    transition: 1s;
}

.feed {
    text-align: left;
}

.item {
    margin-top: 10px;
    padding: 10px;
    background: #1a2238;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">DEFANS</div>
    <p>Dezenformasyon Erken Analiz Sistemi</p>

    <div class="box">
        <textarea id="text" placeholder="Metin gir..."></textarea>
        <button onclick="analyze()">Yapay Zeka Analizi Başlat</button>

        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
    </div>

    <div class="box feed" id="feed"></div>
</div>

<script>
function analyze(){
    let text = document.getElementById("text").value;

    fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({text})
    })
    .then(r=>r.json())
    .then(d=>{
        document.getElementById("bar").style.width = d.score + "%";
    });
}


function loadFeed(){
    fetch("/feed")
    .then(r=>r.json())
    .then(data=>{
        let html="";
        data.forEach(i=>{
            html += `<div class="item">📱 ${i.platform}: ${i.text}</div>`;
        });
        document.getElementById("feed").innerHTML = html;
    });
}

setInterval(loadFeed, 5000);
loadFeed();
</script>

</body>
</html>
