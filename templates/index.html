<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>DEFANS PRO</h1>

<div class="panel">
<textarea id="text"></textarea>
<button onclick="analyze()">Analiz</button>
</div>

<div id="result"></div>

<h2>Sosyal Medya</h2>
<div id="feed"></div>

<div id="map"></div>

<canvas id="chart"></canvas>

</div>

<script>
async function analyze(){
let t = document.getElementById("text").value;

let res = await fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({text:t})
});

let d = await res.json();

document.getElementById("result").innerHTML =
"%"+d.score;
}

async function loadFeed(){

let res = await fetch("/twitter");
let data = await res.json();

let html="";

data.forEach(i=>{
html+=`
<div class="feedItem">
<b>${i.platform}</b>
<p>${i.text}</p>
<div class="progressBar" style="width:${i.risk}%"></div>
%${i.risk}
</div>
`;
});

document.getElementById("feed").innerHTML=html;

drawMap(data);
drawChart(data);
}

setInterval(loadFeed,4000);


// MAP
var map = L.map('map').setView([39,35],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

function drawMap(data){
data.forEach(d=>{
let lat = 36 + Math.random()*6;
let lon = 26 + Math.random()*10;

L.circle([lat,lon],{
color:d.risk>70?"red":"orange",
radius:d.risk*800
}).addTo(map);
});
}

// CHART (KÜÇÜK)
function drawChart(data){

let safe = data.filter(x=>x.risk<50).length;
let danger = data.filter(x=>x.risk>=50).length;

new Chart(document.getElementById("chart"),{
type:'doughnut',
data:{
labels:['Güvenli','Riskli'],
datasets:[{data:[safe,danger]}]
}
});
}

loadFeed();
</script>

</body>
</html>
