<!DOCTYPE html>
<html>
<body>

<h1>DEFANS AUTO AI</h1>

<textarea id="text"></textarea>
<input id="image" placeholder="image url">

<button onclick="go()">Analiz</button>

<div id="res"></div>

<button onclick="good()">Doğru</button>
<button onclick="bad()">Yanlış</button>

<script>
let lastText=""

function go(){
let t=text.value
let i=image.value
lastText=t

fetch("/analyze",{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"text="+t+"&image="+i
})
.then(r=>r.json())
.then(d=>{
res.innerText = d.error?d.error:"Risk %"+d.risk+" "+d.label
})
}

function good(){
fetch("/feedback",{method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"text="+lastText+"&label=0"})
}

function bad(){
fetch("/feedback",{method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:"text="+lastText+"&label=1"})
}
</script>

</body>
</html>
